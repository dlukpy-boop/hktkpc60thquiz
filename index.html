<!DOCTYPE html>

<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>波記知多少問答遊戲</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@400;700;900&family=Noto+Serif+HK:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:#1a2a5e; --red:#c0272d; --gold:#c9a84c; --gold2:#f0d080;
    --bg:#0e1830; --card:#162040; --text:#f5f0e8; --muted:#8890b0;
    --correct:#2ecc71; --wrong:#e74c3c;
  }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  body {
    background:var(--bg); color:var(--text); font-family:'Noto Sans HK',sans-serif;
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    overflow:hidden; position:relative;
  }
  #gifBg { position:fixed; inset:0; background:url('bg01.gif') center/cover no-repeat; opacity:0; transition:opacity .5s; pointer-events:none; z-index:0; }
  #gifBg.show { opacity:1; }
  #darkBg { position:fixed; inset:0; background:var(--bg); opacity:0; transition:opacity .5s; pointer-events:none; z-index:0; }
  #darkBg.show { opacity:1; }
  .bg-orb { position:fixed; border-radius:50%; filter:blur(90px); opacity:0; pointer-events:none; transition:opacity .8s; z-index:0; }
  .bg-orb.a { width:350px; height:350px; background:var(--navy); top:-80px; left:-80px; }
  .bg-orb.b { width:300px; height:300px; background:var(--red); bottom:-60px; right:-60px; }
  .bg-orb.c { width:220px; height:220px; background:var(--gold); top:40%; left:40%; }
  .bg-orb.show { opacity:.25; }

.screen { display:none; width:100%; max-width:780px; padding:20px 16px; position:relative; z-index:1; overflow-y:auto; max-height:100vh; }
.screen.active { display:flex; flex-direction:column; align-items:center; animation:fadeUp .4s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }

/* START */
#startScreen { justify-content:center; align-items:center; padding:0; }
#startScreen .btn-start {
position:fixed; bottom:12%; left:35%; transform:translateX(-50%);
background:none; border:none; padding:0; cursor:pointer;
}
#startScreen .btn-start img { width:130px; display:block; }
#startScreen .btn-leaderboard {
position:fixed; bottom:12%; left:62%; transform:translateX(-50%);
background:none; border:none; padding:0; cursor:pointer;
}
#startScreen .btn-leaderboard img { width:130px; display:block; }

/* WIN98 WINDOW */
.win98-window {
width: 100%;
border: 2px solid #fff;
border-right-color: #808080;
border-bottom-color: #808080;
box-shadow: 1px 1px 0 #000, inset 1px 1px 0 #dfdfdf;
background: #c0c0c0;
}
.win98-titlebar {
background: linear-gradient(90deg, #000080, #1084d0);
padding: 4px 6px;
display: flex; align-items: center; justify-content: space-between;
user-select: none;
}
.win98-title {
color: #fff; font-size: .82rem; font-weight: 700;
font-family: ‘Noto Sans HK’, sans-serif; letter-spacing: 0.5px;
}
.win98-btns { display: flex; gap: 2px; }
.win98-btn {
background: #c0c0c0;
border: 1px solid #fff; border-right-color: #808080; border-bottom-color: #808080;
width: 22px; height: 20px; font-size: .75rem; cursor: pointer;
display: flex; align-items: center; justify-content: center;
color: #000; font-family: monospace;
}
.win98-close { font-weight: 900; }
.win98-close:hover { background: #e74c3c; color: #fff; }
.win98-body { padding: 12px; background: #c0c0c0; }

/* override card colours inside win98 */
.win98-body .question-card { background: #fff; border: 2px inset #808080; border-radius: 0; }
.win98-body .question-card::before { display: none; }
.win98-body .q-num { color: #000080; }
.win98-body .q-text { color: #000; }
.win98-body .score-badge { border-color: #808080; color: #000080; background: #fff; }
.win98-body .option-btn { background: #fff; border: 2px outset #c0c0c0; border-radius: 0; color: #000; }
.win98-body .option-btn:not(:disabled):hover { background: #000080; color: #fff; border-color: #000080; transform: none; }
.win98-body .option-btn .opt-label { background: #c0c0c0; color: #000; border-radius: 0; }
.win98-body .option-btn.correct { background: #008000; color: #fff; border-color: #006000; }
.win98-body .option-btn.correct .opt-label { background: #006000; color: #fff; }
.win98-body .option-btn.wrong { background: #cc0000; color: #fff; border-color: #900000; }
.win98-body .option-btn.wrong .opt-label { background: #900000; color: #fff; }
.win98-body .photo-btn { border-radius: 0; border: 2px outset #c0c0c0; }
.win98-body .photo-btn.correct { border-color: #008000; background: rgba(0,128,0,.15); }
.win98-body .photo-btn.wrong { border-color: #cc0000; }
.win98-body .photo-btn .photo-name { color: #000; }
.win98-body .photo-btn .photo-subj { color: #444; }
.win98-body .btn-next { border-radius: 0; border: 2px outset #c0c0c0; background: #c0c0c0; color: #000; }
.win98-body .btn-next:hover { background: #000080; color: #fff; }
.win98-body .progress-wrap { background: #808080; }
.win98-body .progress-bar { background: #000080; }

/* QUIZ HEADER */
.quiz-header { width:100%; display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; gap:10px; }
.progress-wrap { flex:1; height:6px; background:rgba(255,255,255,.1); border-radius:99px; overflow:hidden; }
.progress-bar { height:100%; background:linear-gradient(90deg,var(–red),var(–gold)); border-radius:99px; transition:width .5s ease; }
.score-badge { background:rgba(201,168,76,.15); border:1px solid rgba(201,168,76,.35); border-radius:100px; padding:6px 14px; font-size:.85rem; color:var(–gold); font-weight:700; white-space:nowrap; }
.btn-exit { background:rgba(192,39,45,.15); border:1px solid rgba(192,39,45,.4); border-radius:100px; padding:6px 12px; font-size:.8rem; color:#e08080; font-family:‘Noto Sans HK’,sans-serif; cursor:pointer; white-space:nowrap; transition:all .2s; }
.btn-exit:hover { background:rgba(192,39,45,.35); color:#fff; }
.timer-ring-wrap { position:relative; width:50px; height:50px; flex-shrink:0; }
.timer-ring-wrap svg { transform:rotate(-90deg); }
.timer-track { fill:none; stroke:rgba(255,255,255,.08); stroke-width:4; }
.timer-fill  { fill:none; stroke:var(–gold); stroke-width:4; stroke-linecap:round; transition:stroke-dashoffset 1s linear,stroke .3s; }
.timer-text  { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:.9rem; font-weight:700; color:var(–gold); }

/* QUESTION CARD */
.question-card { background:var(–card); border:1px solid rgba(201,168,76,.2); border-radius:20px; padding:18px 20px 14px; width:100%; margin-bottom:12px; position:relative; overflow:hidden; flex-shrink:0; }
.question-card::before { content:’’; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,var(–red),var(–gold)); }
.q-num { font-size:.72rem; color:var(–gold); font-weight:700; letter-spacing:2px; margin-bottom:6px; }
.q-text { font-size:clamp(.95rem,2.8vw,1.2rem); font-weight:700; line-height:1.45; }

/* TEXT OPTIONS */
.options-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; width:100%; }
@media (max-width:480px) { .options-grid { grid-template-columns:1fr; } }
.option-btn { background:rgba(255,255,255,.04); border:1.5px solid rgba(255,255,255,.1); border-radius:14px; padding:14px 16px; font-size:clamp(.88rem,2.2vw,.98rem); font-family:‘Noto Sans HK’,sans-serif; color:var(–text); cursor:pointer; text-align:left; transition:all .2s; display:flex; align-items:center; gap:10px; }
.option-btn:not(:disabled):hover { border-color:var(–gold); background:rgba(201,168,76,.08); transform:translateY(-2px); }
.option-btn:not(:disabled):active { transform:scale(.97); }
.opt-label { width:28px; height:28px; border-radius:50%; background:rgba(255,255,255,.08); display:flex; align-items:center; justify-content:center; font-weight:900; font-size:.8rem; flex-shrink:0; transition:all .2s; }
.option-btn.correct { background:rgba(46,204,113,.15); border-color:var(–correct); }
.option-btn.correct .opt-label { background:var(–correct); color:#fff; }
.option-btn.wrong   { background:rgba(231,76,60,.15); border-color:var(–wrong); animation:shake .4s ease; }
.option-btn.wrong .opt-label   { background:var(–wrong); color:#fff; }
.option-btn:disabled { cursor:not-allowed; }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 60%{transform:translateX(6px)} }

/* PHOTO OPTIONS GRID - 1x4 horizontal */
.photo-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; width:100%; }
.photo-btn {
background:rgba(255,255,255,.04); border:2px solid rgba(255,255,255,.1);
border-radius:12px; overflow:hidden; cursor:pointer; transition:all .2s;
display:flex; flex-direction:column; padding:0;
}
.photo-btn:not(:disabled):hover { border-color:var(–gold); transform:translateY(-2px); }
.photo-btn:not(:disabled):active { transform:scale(.97); }
.photo-btn img { width:100%; aspect-ratio:3/4; object-fit:cover; object-position:center top; display:block; }
.photo-btn .photo-info {
padding:6px 4px; font-size:.68rem; text-align:center; line-height:1.3;
min-height:36px; display:flex; align-items:center; justify-content:center;
flex-direction:column; gap:1px;
}
.photo-btn .photo-name { font-weight:700; color:var(–text); font-size:.7rem; }
.photo-btn .photo-subj { color:var(–muted); font-size:.65rem; }

/* revealed states */
.photo-btn.correct { border-color:var(–correct); background:rgba(46,204,113,.1); }
.photo-btn.correct .photo-info { background:rgba(46,204,113,.15); }
.photo-btn.wrong   { border-color:var(–wrong); background:rgba(231,76,60,.1); animation:shake .4s ease; }
.photo-btn.wrong .photo-info   { background:rgba(231,76,60,.1); }
.photo-btn.revealed { border-color:rgba(201,168,76,.3); }
.photo-btn.revealed .photo-info { background:rgba(201,168,76,.05); }
.photo-btn:disabled { cursor:not-allowed; }

/* next btn for teacher questions */
.btn-next { display:none; margin-top:14px; background:linear-gradient(135deg,var(–gold),#a07828); color:#0e1830; border:none; border-radius:50px; padding:14px 48px; font-size:1rem; font-weight:900; font-family:‘Noto Sans HK’,sans-serif; cursor:pointer; transition:transform .15s; }
.btn-next:active { transform:scale(.96); }

/* FEEDBACK */
.feedback-overlay { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:none; z-index:100; opacity:0; }
.feedback-overlay.show { animation:feedbackPop .8s ease forwards; }
.feedback-icon { font-size:7rem; }
@keyframes feedbackPop { 0%{opacity:0;transform:scale(.5)} 30%{opacity:1;transform:scale(1.2)} 70%{opacity:1;transform:scale(1)} 100%{opacity:0;transform:scale(1)} }

.confetti-container { position:fixed; inset:0; pointer-events:none; z-index:200; }
.confetti-piece { position:absolute; width:10px; height:10px; border-radius:2px; animation:confettiFall linear forwards; }
@keyframes confettiFall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(100vh) rotate(720deg);opacity:0} }

/* RESULT */
.result-circle { width:140px; height:140px; border-radius:50%; border:5px solid var(–gold); display:flex; flex-direction:column; align-items:center; justify-content:center; margin:12px 0; animation:glow 2s ease-in-out infinite alternate; }
@keyframes glow { from{box-shadow:0 0 40px rgba(201,168,76,.2)} to{box-shadow:0 0 80px rgba(201,168,76,.5)} }
.result-score { font-family:‘Noto Serif HK’,serif; font-size:3rem; color:var(–gold); font-weight:900; }
.result-total { font-size:.9rem; color:var(–muted); }
.result-msg { font-size:1.35rem; font-weight:900; margin-bottom:4px; text-align:center; }
.result-sub { font-size:.9rem; color:var(–muted); margin-bottom:16px; text-align:center; }
.name-box { background:var(–card); border:1px solid rgba(201,168,76,.3); border-radius:18px; padding:18px 20px; width:100%; margin-bottom:14px; text-align:center; }
.name-box p { font-size:.9rem; color:var(–gold2); margin-bottom:10px; }
.name-input { background:rgba(255,255,255,.06); border:1.5px solid rgba(201,168,76,.35); border-radius:12px; padding:11px 14px; font-size:1rem; font-family:‘Noto Sans HK’,sans-serif; color:var(–text); width:100%; max-width:260px; text-align:center; outline:none; transition:border-color .2s; }
.name-input:focus { border-color:var(–gold); }
.name-input::placeholder { color:var(–muted); }
.btn-row { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
.btn-save { background:linear-gradient(135deg,var(–gold),#a07828); color:#0e1830; border:none; border-radius:50px; padding:12px 32px; font-size:.95rem; font-weight:900; font-family:‘Noto Sans HK’,sans-serif; cursor:pointer; }
.btn-retry { background:transparent; color:var(–muted); border:1.5px solid rgba(255,255,255,.15); border-radius:50px; padding:12px 24px; font-size:.92rem; font-weight:700; font-family:‘Noto Sans HK’,sans-serif; cursor:pointer; transition:all .2s; }
.btn-retry:hover { border-color:var(–gold); color:var(–gold); }

/* LEADERBOARD */
#leaderboardScreen { overflow-y:auto; max-height:100vh; }
.lb-header { width:100%; display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
.lb-title { font-family:‘Noto Serif HK’,serif; font-size:1.5rem; font-weight:900; color:var(–gold); }
.btn-back { background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.15); border-radius:100px; padding:7px 18px; font-size:.85rem; color:var(–muted); font-family:‘Noto Sans HK’,sans-serif; cursor:pointer; transition:all .2s; }
.btn-back:hover { border-color:var(–gold); color:var(–gold); }
.lb-list { width:100%; display:flex; flex-direction:column; gap:9px; }
.lb-item { background:var(–card); border:1px solid rgba(255,255,255,.07); border-radius:13px; padding:13px 18px; display:flex; align-items:center; gap:14px; }
.lb-item.top1 { border-color:rgba(201,168,76,.5); background:rgba(201,168,76,.08); }
.lb-item.top2 { border-color:rgba(180,180,180,.4); }
.lb-item.top3 { border-color:rgba(180,100,40,.4); }
.lb-rank { font-size:1.3rem; width:34px; text-align:center; flex-shrink:0; }
.lb-name { flex:1; font-weight:700; }
.lb-score { font-family:‘Noto Serif HK’,serif; font-size:1.2rem; color:var(–gold); font-weight:900; }
.lb-date { font-size:.72rem; color:var(–muted); }
.lb-empty { color:var(–muted); text-align:center; padding:40px 0; }
.btn-clear { margin-top:18px; background:transparent; border:1px solid rgba(192,39,45,.3); border-radius:100px; padding:7px 22px; font-size:.8rem; color:rgba(192,39,45,.6); font-family:‘Noto Sans HK’,sans-serif; cursor:pointer; transition:all .2s; }
.btn-clear:hover { border-color:var(–red); color:var(–red); }
</style>

</head>
<body>

<div id="gifBg" class="show"></div>
<div id="darkBg"></div>
<div class="bg-orb a" id="orbA"></div>
<div class="bg-orb b" id="orbB"></div>
<div class="bg-orb c" id="orbC"></div>
<div class="feedback-overlay" id="feedbackOverlay"><div class="feedback-icon" id="feedbackIcon"></div></div>
<div class="confetti-container" id="confettiContainer"></div>

<!-- START -->

<div class="screen active" id="startScreen">
  <button class="btn-start" onclick="startQuiz()">
    <img src="bn_start.png" alt="開始挑戰">
  </button>
  <button class="btn-leaderboard" onclick="showLeaderboard()">
    <img src="bn_chart.png" alt="龍虎榜">
  </button>
</div>

<!-- QUIZ -->

<div class="screen" id="quizScreen">
  <!-- Win98 window frame -->
  <div class="win98-window">
    <div class="win98-titlebar">
      <span class="win98-title">🏫 波記知多少問答遊戲</span>
      <div class="win98-btns">
        <span class="win98-btn">─</span>
        <span class="win98-btn">□</span>
        <span class="win98-btn win98-close" onclick="exitQuiz()">✕</span>
      </div>
    </div>
    <div class="win98-body">
      <div class="quiz-header">
        <div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:10%"></div></div>
        <div class="timer-ring-wrap">
          <svg width="50" height="50" viewBox="0 0 50 50">
            <circle class="timer-track" cx="25" cy="25" r="21"/>
            <circle class="timer-fill" id="timerRing" cx="25" cy="25" r="21" stroke-dasharray="131.9" stroke-dashoffset="0"/>
          </svg>
          <div class="timer-text" id="timerText">15</div>
        </div>
        <div class="score-badge">分數 <span id="scoreDisplay">0</span></div>
      </div>
      <div class="question-card">
        <div class="q-num" id="qNum">問題 01 / 10</div>
        <div class="q-text" id="qText"></div>
      </div>
      <div id="optionsGrid"></div>
      <button class="btn-next" id="btnNext" onclick="nextQuestion()">下一題 →</button>
    </div>
  </div>
</div>

<!-- RESULT -->

<div class="screen" id="resultScreen">
  <div class="result-msg" id="resultMsg"></div>
  <img id="resultLevelImg" src="" alt="等級" style="display:none;width:160px;height:160px;object-fit:contain;margin:8px 0;">
  <div class="result-circle">
    <div class="result-score" id="resultScore">0</div>
    <div class="result-total" id="resultTotal">/ 10 題</div>
  </div>
  <div class="result-sub" id="resultSub"></div>
  <div class="name-box">
    <p>輸入你嘅名字，記錄到龍虎榜！</p>
    <input class="name-input" id="nameInput" type="text" maxlength="12" placeholder="你嘅名字">
  </div>
  <div class="btn-row">
    <button class="btn-save" onclick="saveScore()">✦ 記錄成績</button>
    <button class="btn-retry" onclick="restartQuiz()">再玩一次</button>
  </div>
  <button onclick="showScreen('startScreen')" style="margin-top:12px;background:transparent;border:none;color:var(--muted);font-size:.88rem;font-family:'Noto Sans HK',sans-serif;cursor:pointer;text-decoration:underline;">返回首頁</button>
</div>

<!-- LEADERBOARD -->

<div class="screen" id="leaderboardScreen">
  <div class="lb-header">
    <div class="lb-title">🏆 龍虎榜</div>
    <button class="btn-back" onclick="showScreen('startScreen')">← 返回</button>
  </div>
  <div class="lb-list" id="lbList"></div>
  <button class="btn-clear" onclick="clearScores()">清除所有記錄</button>
</div>

<!-- EXIT MODAL -->

<div id="exitModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:500;align-items:center;justify-content:center;">
  <div style="background:#c0c0c0;border:2px solid #fff;border-right-color:#808080;border-bottom-color:#808080;box-shadow:2px 2px 0 #000;max-width:320px;width:90%;overflow:hidden;">
    <div style="background:linear-gradient(90deg,#000080,#1084d0);padding:4px 8px;display:flex;align-items:center;justify-content:space-between;">
      <span style="color:#fff;font-size:.82rem;font-weight:700;font-family:'Noto Sans HK',sans-serif;">⚠️ 確定退出？</span>
      <span onclick="closeExitModal()" style="background:#c0c0c0;border:1px solid #fff;border-right-color:#808080;border-bottom-color:#808080;width:22px;height:20px;font-size:.75rem;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:900;">✕</span>
    </div>
    <div style="padding:20px 24px;text-align:center;">
      <img src="quitwarn.png" alt="" style="width:180px;height:180px;object-fit:contain;margin-bottom:12px;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.3));">
      <div style="font-size:1rem;font-weight:700;margin-bottom:4px;color:#000;">你係咪真係要走？</div>
      <div style="font-size:.85rem;color:#444;margin-bottom:20px;">現時分數將不會記錄</div>
      <div style="display:flex;gap:10px;justify-content:center;">
        <button onclick="confirmExit()" style="background:#c0c0c0;border:2px outset #c0c0c0;padding:6px 24px;font-size:.95rem;font-weight:700;font-family:'Noto Sans HK',sans-serif;cursor:pointer;min-width:80px;">退出</button>
        <button onclick="closeExitModal()" style="background:#c0c0c0;border:2px outset #c0c0c0;padding:6px 24px;font-size:.95rem;font-weight:700;font-family:'Noto Sans HK',sans-serif;cursor:pointer;min-width:80px;">繼續</button>
      </div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// 老師資料庫
// ═══════════════════════════════════════════
const TEACHERS = [
  { id:'t01', name:'陳彩微老師', subj:['中文','普通話'], alumni:false, male:false },
  { id:'t02', name:'蔡逾翰老師', subj:['數學'],          alumni:false, male:true  },
  { id:'t03', name:'林詩美老師', subj:['中文','宗教'],   alumni:false, male:false },
  { id:'t04', name:'范小玲老師', subj:['中文','普通話'], alumni:false, male:false },
  { id:'t05', name:'韓江老師',   subj:['經濟','經公'],   alumni:false, male:true  },
  { id:'t06', name:'高炳江老師', subj:['中文','普通話'], alumni:false, male:true  },
  { id:'t07', name:'蔡振輝老師', subj:['化學'],          alumni:true,  male:true  },
  { id:'t08', name:'鄧耀忠老師', subj:['通識','公民'],   alumni:true,  male:true  },

  { id:'t10', name:'楊慧儀老師', subj:['數學','宗教'],   alumni:false, male:false },

// ═══════════════════════════════════════════
// 普通題目庫
// ═══════════════════════════════════════════
const ALL_QUESTIONS = [
  { q:"校徽內的其中一項象徵性標誌？", correctPool:["帆船","十字架","山","海"], wrongPool:["星星","火炬","鴿子"], multiPool:true },
  { q:"2022年宗教培育組和音樂組聯合舉辦哪一種新興樂器體驗工作坊？", options:["空靈鼓","結他","鋼琴","小提琴"], answer:0 },
  { q:"5樓夥伴角落在哪一年設立？", options:["2022","2023","2024","2025"], answer:2 },
  { q:"6樓STEM Room哪一年開幕？", options:["2021","2022","2023","2024"], answer:2 },
  { q:"中文科每年都會前往哪一間大學進行實景寫作？", options:["香港大學","香港中文大學","香港理工大學","香港城市大學"], answer:1 },
  { q:"指出「四社」其中一社", correctPool:["盧華社","維豪社","納德社","鳴道社"], wrongPool:["志誠社","明德社","光華社"], multiPool:true },
  { q:"金禧校慶時舉行哪一項活動？", options:["服務5000","校友日","運動會","音樂會"], answer:0 },
  { q:"學生會在香港哪一個場地舉行「年宵」？", options:["維多利亞公園","旺角公園","九龍公園","香港公園"], answer:0 },
  { q:"哪一年與深圳市光明區外國語學校結為姊妹學校？", options:["2021","2022","2023","2024"], answer:2 },
  { q:"鄧鏡波先生出生自中國哪一個地方？", options:["廣州","廣東新會","香港","澳門"], answer:1 },
  { q:"全校共有多少層？", options:["5層","6層","7層","8層"], answer:2 },
  { q:"本校自哪一年創立？", options:["1960","1963","1965","1968"], answer:2 },
  { q:"哪一年成立法團校董會？", options:["2010","2011","2012","2013"], answer:3 },
  { q:"學校第一屆年宵的主題名為？（提示：四個字，當年為龍年）", options:["望子成龍","龍馬精神","龍騰四海","生龍活虎"], answer:0 },
  { q:"STEM Room在學校哪一個樓層？", options:["4/F","5/F","6/F","7/F"], answer:2 },
];

// 虛構老師名字（猜名字題錯誤選項）
const FAKE_NAMES = ["吳家明老師","李志強老師","張偉文老師","黃建新老師","劉永康老師","鄭文傑老師","何志遠老師","馮偉明老師","周啟聰老師","葉國雄老師"];

const QUESTIONS_PER_GAME = 10;
const MAX_TEACHER_Q = 4;
const TIME_PER_Q = 15;
const CIRCUMFERENCE = 131.9;
const LEADERBOARD_KEY = 'pokey_quiz_scores';

let currentQ = 0, score = 0, timer = null, timeLeft = TIME_PER_Q, answered = false;
let gameQuestions = [], finalScore = 0;
let isTeacherQ = false;

// ═══════════════════════════════════════════
// 自動生成老師題目
// ═══════════════════════════════════════════
function generateTeacherQuestions(count) {
  const qs = [];
  const types = ['subject','exclude','alumni'];
  const shuffledTeachers = [...TEACHERS].sort(() => Math.random() - 0.5);
  const usedTypes = [...types].sort(() => Math.random() - 0.5);

  // subject: 教咩科→猜圖片
  function makeSubjectQ(teacher) {
    const subj = teacher.subj[0];
    const correct = teacher;
    const others = TEACHERS.filter(t => t.id !== teacher.id && !t.subj.includes(subj)).sort(() => Math.random() - 0.5).slice(0, 3);
    if (others.length < 3) return null;
    const opts = [correct, ...others].sort(() => Math.random() - 0.5);
    return { type:'photo', teacherQ:true, q:`以下哪位老師係教${subj}科？`, opts, correctId:correct.id };
  }

  // exclude: 邊位唔係教XX科
  function makeExcludeQ() {
    const subjs = [...new Set(TEACHERS.flatMap(t => t.subj))];
    const subj = subjs[Math.floor(Math.random() * subjs.length)];
    const teaching = TEACHERS.filter(t => t.subj.includes(subj));
    const notTeaching = TEACHERS.filter(t => !t.subj.includes(subj));
    if (teaching.length < 3 || notTeaching.length < 1) return null;
    const correct = notTeaching[Math.floor(Math.random() * notTeaching.length)];
    const wrongs = teaching.sort(() => Math.random() - 0.5).slice(0, 3);
    const opts = [correct, ...wrongs].sort(() => Math.random() - 0.5);
    return { type:'photo', teacherQ:true, q:`以下哪位老師唔係教${subj}科？`, opts, correctId:correct.id };
  }

  // alumni: 邊位係校友（只用男老師）
  function makeAlumniQ() {
    const maleAlumni = TEACHERS.filter(t => t.alumni && t.male);
    const maleNonAlumni = TEACHERS.filter(t => !t.alumni && t.male);
    if (maleAlumni.length < 1 || maleNonAlumni.length < 3) return null;
    const correct = maleAlumni[Math.floor(Math.random() * maleAlumni.length)];
    const wrongs = maleNonAlumni.sort(() => Math.random() - 0.5).slice(0, 3);
    const opts = [correct, ...wrongs].sort(() => Math.random() - 0.5);
    return { type:'photo', teacherQ:true, q:'以下哪位老師係本校校友？', opts, correctId:correct.id };
  }

  let attempts = 0;
  let tIdx = 0;
  while (qs.length < count && attempts < 30) {
    attempts++;
    const typeIdx = qs.length % usedTypes.length;
    const t = usedTypes[typeIdx];
    let q = null;
    if (t === 'subject') q = makeSubjectQ(shuffledTeachers[tIdx % shuffledTeachers.length]);
    else if (t === 'exclude') q = makeExcludeQ();
    else if (t === 'alumni') q = makeAlumniQ();
    if (q) { qs.push(q); tIdx++; }
  }
  return qs;
}

function pickQuestions() {
  const teacherQs = generateTeacherQuestions(MAX_TEACHER_Q);
  const normalPool = [...ALL_QUESTIONS].sort(() => Math.random() - 0.5).slice(0, QUESTIONS_PER_GAME - teacherQs.length);
  return [...teacherQs, ...normalPool].sort(() => Math.random() - 0.5);
}

// ═══════════════════════════════════════════
// Screen / flow
// ═══════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const isStart = id === 'startScreen';
  document.getElementById('gifBg').classList.toggle('show', isStart);
  document.getElementById('darkBg').classList.toggle('show', !isStart);
  ['orbA','orbB','orbC'].forEach(o => document.getElementById(o).classList.toggle('show', !isStart));
}

function startQuiz() {
  currentQ = 0; score = 0;
  gameQuestions = pickQuestions();
  showScreen('quizScreen');
  loadQuestion();
}

function loadQuestion() {
  answered = false;
  document.getElementById('btnNext').style.display = 'none';
  const q = gameQuestions[currentQ];
  document.getElementById('progressBar').style.width = `${((currentQ+1)/QUESTIONS_PER_GAME)*100}%`;
  document.getElementById('qNum').textContent = `問題 ${String(currentQ+1).padStart(2,'0')} / ${QUESTIONS_PER_GAME}`;
  document.getElementById('qText').textContent = q.q;
  document.getElementById('scoreDisplay').textContent = score;
  isTeacherQ = !!q.teacherQ;

  if (isTeacherQ) {
    renderPhotoOptions(q);
  } else {
    renderTextOptions(q);
  }
  startTimer();
}

function renderTextOptions(q) {
  let opts = q.options;
  let correctIdx = q.answer;

  if (q.multiPool) {
    const correct = q.correctPool[Math.floor(Math.random()*q.correctPool.length)];
    const wrongs = [...q.wrongPool].sort(() => Math.random()-.5).slice(0,3);
    const all = [correct,...wrongs].sort(() => Math.random()-.5);
    q._options = all; q._correctIdx = all.indexOf(correct);
    opts = all; correctIdx = q._correctIdx;
  }

  const grid = document.createElement('div');
  grid.className = 'options-grid';
  grid.id = 'optionsGrid';
  document.getElementById('optionsGrid').replaceWith(grid);

  ['A','B','C','D'].forEach((lbl,i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="opt-label">${lbl}</span><span>${opts[i]}</span>`;
    btn.onclick = () => selectTextAnswer(i, Array.isArray(q.answer) ? q.answer : (q.multiPool ? q._correctIdx : q.answer));
    grid.appendChild(btn);
  });
}

function renderPhotoOptions(q) {
  const grid = document.createElement('div');
  grid.className = 'photo-grid';
  grid.id = 'optionsGrid';
  document.getElementById('optionsGrid').replaceWith(grid);

  q.opts.forEach((teacher, i) => {
    const btn = document.createElement('button');
    btn.className = 'photo-btn';
    btn.dataset.tid = teacher.id;
    btn.innerHTML = `
      <img src="${teacher.id}.jpg" alt="${teacher.name}" onerror="this.style.background='#2a3a5e';this.style.minHeight='120px'">
      <div class="photo-info">
        <div class="photo-name" style="display:none">${teacher.name}</div>
        <div class="photo-subj" style="display:none">${teacher.subj.join(' · ')}</div>
      </div>`;
    btn.onclick = () => selectPhotoAnswer(teacher.id, q);
    grid.appendChild(btn);
  });
}

function selectTextAnswer(idx, correctIdx) {
  if (answered) return;
  answered = true; clearInterval(timer);
  const isCorrect = Array.isArray(correctIdx) ? correctIdx.includes(idx) : idx === correctIdx;
  const firstCorrect = Array.isArray(correctIdx) ? correctIdx[0] : correctIdx;
  const btns = document.querySelectorAll('.option-btn');
  btns[idx].classList.add(isCorrect ? 'correct' : 'wrong');
  if (!isCorrect) btns[firstCorrect].classList.add('correct');
  btns.forEach(b => b.disabled = true);
  if (isCorrect) { score += Math.max(10, Math.round(timeLeft/TIME_PER_Q*50)+10); showFeedback(true); launchConfetti(); }
  else showFeedback(false);
  document.getElementById('scoreDisplay').textContent = score;
  setTimeout(nextQuestion, 1500);
}

function selectPhotoAnswer(tid, q) {
  if (answered) return;
  answered = true; clearInterval(timer);
  const isCorrect = tid === q.correctId;

  // Reveal all names/subjects + apply correct/wrong/revealed classes
  document.querySelectorAll('.photo-btn').forEach(btn => {
    btn.disabled = true;
    const nameEl = btn.querySelector('.photo-name');
    const subjEl = btn.querySelector('.photo-subj');
    nameEl.style.display = 'block';
    subjEl.style.display = 'block';
    if (btn.dataset.tid === q.correctId) btn.classList.add('correct');
    else if (btn.dataset.tid === tid && !isCorrect) btn.classList.add('wrong');
    else btn.classList.add('revealed');
  });

  if (isCorrect) { score += Math.max(10, Math.round(timeLeft/TIME_PER_Q*50)+10); showFeedback(true); launchConfetti(); }
  else showFeedback(false);
  document.getElementById('scoreDisplay').textContent = score;

  // Show next button instead of auto-advancing
  document.getElementById('btnNext').style.display = 'block';
}

function startTimer() {
  clearInterval(timer);
  timeLeft = TIME_PER_Q; updateTimer();
  timer = setInterval(() => {
    timeLeft--; updateTimer();
    if (timeLeft <= 0) { clearInterval(timer); if (!answered) timeUp(); }
  }, 1000);
}

function updateTimer() {
  const ring = document.getElementById('timerRing');
  const text = document.getElementById('timerText');
  ring.style.strokeDashoffset = CIRCUMFERENCE*(1-timeLeft/TIME_PER_Q);
  ring.style.stroke = timeLeft<=5 ? '#e74c3c' : '#c9a84c';
  text.textContent = timeLeft;
  text.style.color = timeLeft<=5 ? '#e74c3c' : '#c9a84c';
}

function timeUp() {
  answered = true;
  if (isTeacherQ) {
    const q = gameQuestions[currentQ];
    document.querySelectorAll('.photo-btn').forEach(btn => {
      btn.disabled = true;
      btn.querySelector('.photo-name').style.display = 'block';
      btn.querySelector('.photo-subj').style.display = 'block';
      if (btn.dataset.tid === q.correctId) btn.classList.add('correct');
      else btn.classList.add('revealed');
    });
    document.getElementById('btnNext').style.display = 'block';
  } else {
    document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
    // highlight first correct
    const q = gameQuestions[currentQ];
    const ci = q.multiPool ? q._correctIdx : (Array.isArray(q.answer) ? q.answer[0] : q.answer);
    document.querySelectorAll('.option-btn')[ci]?.classList.add('correct');
    setTimeout(nextQuestion, 1500);
  }
  showFeedback(false);
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= QUESTIONS_PER_GAME) showResult();
  else loadQuestion();
}

function showFeedback(ok) {
  const o = document.getElementById('feedbackOverlay');
  document.getElementById('feedbackIcon').textContent = ok ? '✅' : '❌';
  o.className = 'feedback-overlay show';
  setTimeout(() => o.className = 'feedback-overlay', 800);
}

function launchConfetti() {
  const container = document.getElementById('confettiContainer');
  const colors = ['#c9a84c','#f0d080','#c0272d','#1a2a5e','#fff'];
  for (let i=0; i<50; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left = Math.random()*100+'vw';
    p.style.background = colors[Math.floor(Math.random()*colors.length)];
    p.style.animationDuration = (Math.random()*1.5+1)+'s';
    p.style.animationDelay = Math.random()*.5+'s';
    container.appendChild(p);
    setTimeout(() => p.remove(), 2500);
  }
}

function showResult() {
  finalScore = score;
  document.getElementById('resultScore').textContent = score;
  document.getElementById('resultTotal').textContent = `/ ${QUESTIONS_PER_GAME} 題`;
  let msg, sub, img;
  if (score>=450)      { msg='🏆 S級 波記達人！'; sub='你對母校瞭如指掌，校友之光！'; img='levelS.gif'; launchConfetti(); setTimeout(launchConfetti,700); }
  else if (score>=350) { msg='🌟 A級 表現出色！'; sub='對學校認識頗深，繼續加油！'; img='levelA.gif'; }
  else if (score>=250) { msg='👍 B級 不錯喔！'; sub='再溫習一下學校歷史，下次更好！'; img='levelB.gif'; }
  else if (score>=150) { msg='💪 C級 繼續努力！'; sub='多啲認識學校，你可以做到！'; img='levelC.gif'; }
  else                  { msg='📖 D級 多了解母校！'; sub='慢慢認識學校，一定會愛上佢！'; img='levelD.gif'; }
  document.getElementById('resultMsg').textContent = msg;
  document.getElementById('resultSub').textContent = sub;
  const imgEl = document.getElementById('resultLevelImg');
  imgEl.src = img; imgEl.style.display = 'block';
  document.getElementById('nameInput').value = '';
  showScreen('resultScreen');
}

function saveScore() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) { alert('請輸入你嘅名字！'); return; }
  const scores = getScores();
  scores.push({ name, score:finalScore, date:new Date().toLocaleDateString('zh-HK') });
  scores.sort((a,b) => b.score-a.score);
  localStorage.setItem(LEADERBOARD_KEY, JSON.stringify(scores.slice(0,50)));
  showLeaderboard();
}

function getScores() {
  try { return JSON.parse(localStorage.getItem(LEADERBOARD_KEY))||[]; } catch { return []; }
}

function showLeaderboard() {
  const scores = getScores();
  const list = document.getElementById('lbList');
  list.innerHTML = '';
  if (!scores.length) { list.innerHTML='<div class="lb-empty">未有記錄，快來挑戰！</div>'; }
  else {
    const medals = ['🥇','🥈','🥉'];
    scores.forEach((s,i) => {
      const div = document.createElement('div');
      div.className = `lb-item${i<3?' top'+(i+1):''}`;
      div.innerHTML = `<div class="lb-rank">${medals[i]||(i+1)}</div><div class="lb-name">${s.name}</div><div style="text-align:right"><div class="lb-score">${s.score}</div><div class="lb-date">${s.date}</div></div>`;
      list.appendChild(div);
    });
  }
  showScreen('leaderboardScreen');
}

function clearScores() {
  if (confirm('確定清除所有龍虎榜記錄？')) { localStorage.removeItem(LEADERBOARD_KEY); showLeaderboard(); }
}

function exitQuiz() { document.getElementById('exitModal').style.display='flex'; }
function confirmExit() { closeExitModal(); clearInterval(timer); showScreen('startScreen'); }
function closeExitModal() { document.getElementById('exitModal').style.display='none'; }
function restartQuiz() { startQuiz(); }
</script>
