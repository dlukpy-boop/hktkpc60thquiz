<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>波記知多少問答遊戲</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@400;700;900&family=Noto+Serif+HK:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:  #1a2a5e;
    --red:   #c0272d;
    --gold:  #c9a84c;
    --gold2: #f0d080;
    --bg:    #0e1830;
    --card:  #162040;
    --text:  #f5f0e8;
    --muted: #8890b0;
    --correct: #2ecc71;
    --wrong:   #e74c3c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Noto Sans HK', sans-serif;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    overflow: hidden; position: relative;
  }

  #gifBg {
    position: fixed; inset: 0;
    background: url('quizbg.gif') center center / cover no-repeat;
    opacity: 0; transition: opacity 0.5s; pointer-events: none; z-index: 0;
  }
  #gifBg.show { opacity: 1; }
  #darkBg {
    position: fixed; inset: 0; background: var(--bg);
    opacity: 0; transition: opacity 0.5s; pointer-events: none; z-index: 0;
  }
  #darkBg.show { opacity: 1; }
  .bg-orb {
    position: fixed; border-radius: 50%; filter: blur(90px);
    opacity: 0; pointer-events: none; transition: opacity 0.8s; z-index: 0;
  }
  .bg-orb.a { width: 350px; height: 350px; background: var(--navy); top: -80px; left: -80px; }
  .bg-orb.b { width: 300px; height: 300px; background: var(--red); bottom: -60px; right: -60px; }
  .bg-orb.c { width: 220px; height: 220px; background: var(--gold); top: 40%; left: 40%; }
  .bg-orb.show { opacity: 0.25; }

  .screen { display: none; width: 100%; max-width: 700px; padding: 32px 24px; position: relative; z-index: 1; }
  .screen.active { display: flex; flex-direction: column; align-items: center; animation: fadeUp 0.4s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }

  /* ── START ── */
  #startScreen { justify-content: center; align-items: center; }
  #startScreen .btn-start {
    position: fixed; bottom: 18%; left: 50%; transform: translateX(-50%);
  }
  #startScreen .btn-leaderboard {
    position: fixed; bottom: 7%; left: 50%; transform: translateX(-50%);
  }
  .btn-start {
    background: linear-gradient(135deg, var(--red), #8b1a1e);
    color: #fff; border: none; border-radius: 50px;
    padding: 18px 64px; font-size: 1.3rem; font-weight: 900;
    font-family: 'Noto Sans HK', sans-serif; cursor: pointer;
    box-shadow: 0 6px 28px rgba(192,39,45,0.45);
    transition: transform 0.15s; letter-spacing: 2px; white-space: nowrap;
  }
  .btn-start:active { transform: scale(0.96) translateX(-50%); }
  .btn-leaderboard {
    background: rgba(201,168,76,0.15);
    border: 1.5px solid rgba(201,168,76,0.5);
    color: var(--gold2); border-radius: 50px;
    padding: 12px 36px; font-size: 1rem; font-weight: 700;
    font-family: 'Noto Sans HK', sans-serif; cursor: pointer;
    transition: all 0.2s; letter-spacing: 1px; white-space: nowrap;
  }
  .btn-leaderboard:hover { background: rgba(201,168,76,0.3); }

  /* ── QUIZ ── */
  .quiz-header {
    width: 100%; display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 20px; gap: 12px;
  }
  .progress-wrap { flex: 1; height: 6px; background: rgba(255,255,255,0.1); border-radius: 99px; overflow: hidden; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, var(--red), var(--gold)); border-radius: 99px; transition: width 0.5s ease; }
  .score-badge {
    background: rgba(201,168,76,0.15); border: 1px solid rgba(201,168,76,0.35);
    border-radius: 100px; padding: 6px 16px;
    font-size: 0.88rem; color: var(--gold); font-weight: 700; white-space: nowrap;
  }
  .btn-exit {
    background: rgba(192,39,45,0.15); border: 1px solid rgba(192,39,45,0.4);
    border-radius: 100px; padding: 6px 14px; font-size: 0.82rem; color: #e08080;
    font-family: 'Noto Sans HK', sans-serif; cursor: pointer; white-space: nowrap; transition: all 0.2s;
  }
  .btn-exit:hover { background: rgba(192,39,45,0.35); color: #fff; }

  .timer-ring-wrap { position: relative; width: 54px; height: 54px; flex-shrink: 0; }
  .timer-ring-wrap svg { transform: rotate(-90deg); }
  .timer-track { fill: none; stroke: rgba(255,255,255,0.08); stroke-width: 4; }
  .timer-fill  { fill: none; stroke: var(--gold); stroke-width: 4; stroke-linecap: round; transition: stroke-dashoffset 1s linear, stroke 0.3s; }
  .timer-text  { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 0.95rem; font-weight: 700; color: var(--gold); }

  .question-card {
    background: var(--card); border: 1px solid rgba(201,168,76,0.2);
    border-radius: 22px; padding: 28px 28px 24px;
    width: 100%; margin-bottom: 20px; position: relative; overflow: hidden;
  }
  .question-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--red), var(--gold));
  }
  .q-num { font-size: 0.75rem; color: var(--gold); font-weight: 700; letter-spacing: 2px; margin-bottom: 10px; }
  .q-text { font-size: clamp(1.05rem, 3.2vw, 1.3rem); font-weight: 700; line-height: 1.55; }

  .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; }
  @media (max-width: 480px) { .options-grid { grid-template-columns: 1fr; } }

  .option-btn {
    background: rgba(255,255,255,0.04); border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: 14px; padding: 16px 18px;
    font-size: clamp(0.9rem, 2.4vw, 1rem); font-family: 'Noto Sans HK', sans-serif;
    color: var(--text); cursor: pointer; text-align: left;
    transition: all 0.2s; display: flex; align-items: center; gap: 12px;
  }
  .option-btn:not(:disabled):hover { border-color: var(--gold); background: rgba(201,168,76,0.08); transform: translateY(-2px); }
  .option-btn:not(:disabled):active { transform: scale(0.97); }
  .opt-label {
    width: 30px; height: 30px; border-radius: 50%; background: rgba(255,255,255,0.08);
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 0.82rem; flex-shrink: 0; transition: all 0.2s;
  }
  .option-btn.correct { background: rgba(46,204,113,0.15); border-color: var(--correct); animation: popIn 0.3s ease; }
  .option-btn.correct .opt-label { background: var(--correct); color: #fff; }
  .option-btn.wrong   { background: rgba(231,76,60,0.15); border-color: var(--wrong); animation: shake 0.4s ease; }
  .option-btn.wrong .opt-label   { background: var(--wrong); color: #fff; }
  .option-btn:disabled { cursor: not-allowed; }

  @keyframes popIn { 0%{transform:scale(1)} 50%{transform:scale(1.04)} 100%{transform:scale(1)} }
  @keyframes shake  { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 60%{transform:translateX(6px)} }

  .feedback-overlay { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; z-index: 100; opacity: 0; }
  .feedback-overlay.show { animation: feedbackPop 0.8s ease forwards; }
  .feedback-icon { font-size: 8rem; }
  @keyframes feedbackPop { 0%{opacity:0;transform:scale(0.5)} 30%{opacity:1;transform:scale(1.2)} 70%{opacity:1;transform:scale(1)} 100%{opacity:0;transform:scale(1)} }

  .confetti-container { position: fixed; inset: 0; pointer-events: none; z-index: 200; }
  .confetti-piece { position: absolute; width: 10px; height: 10px; border-radius: 2px; animation: confettiFall linear forwards; }
  @keyframes confettiFall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(100vh) rotate(720deg);opacity:0} }

  /* ── RESULT ── */
  .result-circle {
    width: 156px; height: 156px; border-radius: 50%;
    border: 5px solid var(--gold);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    margin: 16px 0; animation: glow 2s ease-in-out infinite alternate;
  }
  @keyframes glow { from{box-shadow:0 0 40px rgba(201,168,76,0.2)} to{box-shadow:0 0 80px rgba(201,168,76,0.5)} }
  .result-score { font-family: 'Noto Serif HK', serif; font-size: 3.2rem; color: var(--gold); font-weight: 900; }
  .result-total { font-size: 0.95rem; color: var(--muted); }
  .result-msg  { font-size: 1.4rem; font-weight: 900; margin-bottom: 6px; text-align: center; }
  .result-sub  { font-size: 0.95rem; color: var(--muted); margin-bottom: 20px; text-align: center; }

  .name-box {
    background: var(--card); border: 1px solid rgba(201,168,76,0.3);
    border-radius: 18px; padding: 20px 24px; width: 100%; margin-bottom: 16px; text-align: center;
  }
  .name-box p { font-size: 0.95rem; color: var(--gold2); margin-bottom: 12px; }
  .name-input {
    background: rgba(255,255,255,0.06); border: 1.5px solid rgba(201,168,76,0.35);
    border-radius: 12px; padding: 12px 16px; font-size: 1rem;
    font-family: 'Noto Sans HK', sans-serif; color: var(--text);
    width: 100%; max-width: 280px; text-align: center; outline: none; transition: border-color 0.2s;
  }
  .name-input:focus { border-color: var(--gold); }
  .name-input::placeholder { color: var(--muted); }

  .btn-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .btn-save {
    background: linear-gradient(135deg, var(--gold), #a07828);
    color: #0e1830; border: none; border-radius: 50px;
    padding: 13px 36px; font-size: 1rem; font-weight: 900;
    font-family: 'Noto Sans HK', sans-serif; cursor: pointer; transition: transform 0.15s;
  }
  .btn-save:active { transform: scale(0.96); }
  .btn-retry {
    background: transparent; color: var(--muted);
    border: 1.5px solid rgba(255,255,255,0.15); border-radius: 50px;
    padding: 13px 28px; font-size: 0.95rem; font-weight: 700;
    font-family: 'Noto Sans HK', sans-serif; cursor: pointer; transition: all 0.2s;
  }
  .btn-retry:hover { border-color: var(--gold); color: var(--gold); }

  /* ── LEADERBOARD ── */
  #leaderboardScreen { overflow-y: auto; max-height: 100vh; }
  .lb-header {
    width: 100%; display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px;
  }
  .lb-title { font-family: 'Noto Serif HK', serif; font-size: 1.6rem; font-weight: 900; color: var(--gold); }
  .btn-back {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 100px; padding: 8px 20px; font-size: 0.88rem; color: var(--muted);
    font-family: 'Noto Sans HK', sans-serif; cursor: pointer; transition: all 0.2s;
  }
  .btn-back:hover { border-color: var(--gold); color: var(--gold); }
  .lb-list { width: 100%; display: flex; flex-direction: column; gap: 10px; }
  .lb-item {
    background: var(--card); border: 1px solid rgba(255,255,255,0.07);
    border-radius: 14px; padding: 14px 20px;
    display: flex; align-items: center; gap: 16px;
  }
  .lb-item.top1 { border-color: rgba(201,168,76,0.5); background: rgba(201,168,76,0.08); }
  .lb-item.top2 { border-color: rgba(180,180,180,0.4); }
  .lb-item.top3 { border-color: rgba(180,100,40,0.4); }
  .lb-rank { font-size: 1.4rem; width: 36px; text-align: center; flex-shrink: 0; }
  .lb-name { flex: 1; font-weight: 700; font-size: 1rem; }
  .lb-score { font-family: 'Noto Serif HK', serif; font-size: 1.3rem; color: var(--gold); font-weight: 900; }
  .lb-date { font-size: 0.75rem; color: var(--muted); }
  .lb-empty { color: var(--muted); text-align: center; padding: 40px 0; font-size: 1rem; }
  .btn-clear {
    margin-top: 20px; background: transparent;
    border: 1px solid rgba(192,39,45,0.3); border-radius: 100px;
    padding: 8px 24px; font-size: 0.82rem; color: rgba(192,39,45,0.6);
    font-family: 'Noto Sans HK', sans-serif; cursor: pointer; transition: all 0.2s;
  }
  .btn-clear:hover { border-color: var(--red); color: var(--red); }
</style>
</head>
<body>

<div id="gifBg" class="show"></div>
<div id="darkBg"></div>
<div class="bg-orb a" id="orbA"></div>
<div class="bg-orb b" id="orbB"></div>
<div class="bg-orb c" id="orbC"></div>
<div class="feedback-overlay" id="feedbackOverlay"><div class="feedback-icon" id="feedbackIcon"></div></div>
<div class="confetti-container" id="confettiContainer"></div>

<!-- START -->
<div class="screen active" id="startScreen">
  <button class="btn-start" onclick="startQuiz()">開始挑戰</button>
  <button class="btn-leaderboard" onclick="showLeaderboard()">🏆 龍虎榜</button>
</div>

<!-- QUIZ -->
<div class="screen" id="quizScreen">
  <div class="quiz-header">
    <button class="btn-exit" onclick="exitQuiz()">✕ 退出</button>
    <div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:10%"></div></div>
    <div class="timer-ring-wrap">
      <svg width="54" height="54" viewBox="0 0 54 54">
        <circle class="timer-track" cx="27" cy="27" r="23"/>
        <circle class="timer-fill" id="timerRing" cx="27" cy="27" r="23" stroke-dasharray="144.5" stroke-dashoffset="0"/>
      </svg>
      <div class="timer-text" id="timerText">15</div>
    </div>
    <div class="score-badge">分數 <span id="scoreDisplay">0</span></div>
  </div>
  <div class="question-card">
    <div class="q-num" id="qNum">問題 01 / 10</div>
    <div class="q-text" id="qText"></div>
  </div>
  <div class="options-grid" id="optionsGrid"></div>
</div>

<!-- RESULT -->
<div class="screen" id="resultScreen">
  <div class="result-msg" id="resultMsg"></div>
  <img id="resultLevelImg" src="" alt="等級" style="display:none;width:180px;height:180px;object-fit:contain;margin:8px 0;animation:fadeUp 0.5s ease;">
  <div class="result-circle">
    <div class="result-score" id="resultScore">0</div>
    <div class="result-total" id="resultTotal">/ 10 題</div>
  </div>
  <div class="result-sub" id="resultSub"></div>
  <div class="name-box">
    <p>輸入你嘅名字，記錄到龍虎榜！</p>
    <input class="name-input" id="nameInput" type="text" maxlength="12" placeholder="你嘅名字">
  </div>
  <div class="btn-row">
    <button class="btn-save" onclick="saveScore()">✦ 記錄成績</button>
    <button class="btn-retry" onclick="restartQuiz()">再玩一次</button>
  </div>
  <button onclick="showScreen('startScreen')" style="margin-top:14px;background:transparent;border:none;color:var(--muted);font-size:0.9rem;font-family:'Noto Sans HK',sans-serif;cursor:pointer;text-decoration:underline;">返回首頁</button>
</div>

<!-- LEADERBOARD -->
<div class="screen" id="leaderboardScreen">
  <div class="lb-header">
    <div class="lb-title">🏆 龍虎榜</div>
    <button class="btn-back" onclick="showScreen('startScreen')">← 返回</button>
  </div>
  <div class="lb-list" id="lbList"></div>
  <button class="btn-clear" onclick="clearScores()">清除所有記錄</button>
</div>

<!-- EXIT MODAL -->
<div id="exitModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:500;align-items:center;justify-content:center;">
  <div style="background:#162040;border:1px solid rgba(201,168,76,0.3);border-radius:20px;padding:32px 28px;text-align:center;max-width:300px;width:90%;">
    <div style="font-size:1.1rem;font-weight:700;margin-bottom:8px;">確定退出？</div>
    <div style="font-size:0.9rem;color:#8890b0;margin-bottom:24px;">現時分數將不會記錄</div>
    <div style="display:flex;gap:12px;justify-content:center;">
      <button onclick="confirmExit()" style="background:linear-gradient(135deg,#c0272d,#8b1a1e);color:#fff;border:none;border-radius:50px;padding:12px 28px;font-size:1rem;font-weight:700;font-family:'Noto Sans HK',sans-serif;cursor:pointer;">退出</button>
      <button onclick="closeExitModal()" style="background:transparent;color:#8890b0;border:1.5px solid rgba(255,255,255,0.15);border-radius:50px;padding:12px 28px;font-size:1rem;font-family:'Noto Sans HK',sans-serif;cursor:pointer;">繼續</button>
    </div>
  </div>
</div>

<script>
const ALL_QUESTIONS = [
  {
    q: "校徽內的其中一項象徵性標誌？",
    correctPool: ["帆船", "十字架", "山", "海"],
    wrongPool: ["星星", "火炬", "鴿子"],
    multiPool: true
  },
  {
    q: "2022年宗教培育組和音樂組聯合舉辦哪一種新興樂器體驗工作坊？",
    options: ["空靈鼓", "結他", "鋼琴", "小提琴"],
    answer: 0
  },
  {
    q: "5樓夥伴角落在哪一年設立？",
    options: ["2022", "2023", "2024", "2025"],
    answer: 2
  },
  {
    q: "6樓STEM Room哪一年開幕？",
    options: ["2021", "2022", "2023", "2024"],
    answer: 2
  },
  {
    q: "中文科每年都會前往哪一間大學進行實景寫作？",
    options: ["香港大學", "香港中文大學", "香港理工大學", "香港城市大學"],
    answer: 1
  },
  {
    q: "指出「四社」其中一社",
    correctPool: ["盧華社", "維豪社", "納德社", "鳴道社"],
    wrongPool: ["志誠社", "明德社", "光華社"],
    multiPool: true
  },
  {
    q: "金禧校慶時舉行哪一項活動？",
    options: ["服務5000", "校友日", "運動會", "音樂會"],
    answer: 0
  },
  {
    q: "學生會在香港哪一個場地舉行「年宵」？",
    options: ["維多利亞公園", "旺角公園", "九龍公園", "香港公園"],
    answer: 0
  },
  {
    q: "哪一年與深圳市光明區外國語學校結為姊妹學校？",
    options: ["2021", "2022", "2023", "2024"],
    answer: 2
  },
  {
    q: "鄧鏡波先生出生自中國哪一個地方？",
    options: ["廣州", "廣東新會", "香港", "澳門"],
    answer: 1
  },
  {
    q: "全校共有多少層？",
    options: ["5層", "6層", "7層", "8層"],
    answer: 2
  },
  {
    q: "本校自哪一年創立？",
    options: ["1960", "1963", "1965", "1968"],
    answer: 2
  },
  {
    q: "哪一年成立法團校董會？",
    options: ["2010", "2011", "2012", "2013"],
    answer: 3
  },
  {
    q: "學校第一屆年宵的主題名為？（提示：四個字，當年為龍年）",
    options: ["望子成龍", "龍馬精神", "龍騰四海", "生龍活虎"],
    answer: 0
  },
  {
    q: "STEM Room在學校哪一個樓層？",
    options: ["4/F", "5/F", "6/F", "7/F"],
    answer: 2
  }
];

const QUESTIONS_PER_GAME = 10;
const TIME_PER_Q = 15;
const CIRCUMFERENCE = 144.5;
const LEADERBOARD_KEY = 'pokey_quiz_scores';

let currentQ = 0, score = 0, timer = null, timeLeft = TIME_PER_Q, answered = false;
let gameQuestions = [], finalScore = 0;

function pickQuestions() {
  return [...ALL_QUESTIONS].sort(() => Math.random() - 0.5).slice(0, QUESTIONS_PER_GAME);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const isStart = id === 'startScreen';
  document.getElementById('gifBg').classList.toggle('show', isStart);
  document.getElementById('darkBg').classList.toggle('show', !isStart);
  ['orbA','orbB','orbC'].forEach(o => document.getElementById(o).classList.toggle('show', !isStart));
}

function startQuiz() {
  currentQ = 0; score = 0;
  gameQuestions = pickQuestions();
  showScreen('quizScreen');
  loadQuestion();
}

function loadQuestion() {
  answered = false;
  const q = gameQuestions[currentQ];
  document.getElementById('progressBar').style.width = `${((currentQ + 1) / QUESTIONS_PER_GAME) * 100}%`;
  document.getElementById('qNum').textContent = `問題 ${String(currentQ + 1).padStart(2, '0')} / ${QUESTIONS_PER_GAME}`;
  document.getElementById('qText').textContent = q.q;
  document.getElementById('scoreDisplay').textContent = score;

  // Build options for multiPool questions
  if (q.multiPool) {
    const correct = q.correctPool[Math.floor(Math.random() * q.correctPool.length)];
    const wrongs = [...q.wrongPool].sort(() => Math.random() - 0.5).slice(0, 3);
    const allOpts = [correct, ...wrongs].sort(() => Math.random() - 0.5);
    q._options = allOpts;
    q._correctIdx = allOpts.indexOf(correct);
  }

  const options = q.multiPool ? q._options : q.options;
  const grid = document.getElementById('optionsGrid');
  grid.innerHTML = '';
  ['A','B','C','D'].forEach((lbl, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="opt-label">${lbl}</span><span>${options[i]}</span>`;
    btn.onclick = () => selectAnswer(i);
    grid.appendChild(btn);
  });
  startTimer();
}

function startTimer() {
  clearInterval(timer);
  timeLeft = TIME_PER_Q; updateTimer();
  timer = setInterval(() => {
    timeLeft--; updateTimer();
    if (timeLeft <= 0) { clearInterval(timer); if (!answered) timeUp(); }
  }, 1000);
}

function updateTimer() {
  const ring = document.getElementById('timerRing');
  const text = document.getElementById('timerText');
  ring.style.strokeDashoffset = CIRCUMFERENCE * (1 - timeLeft / TIME_PER_Q);
  ring.style.stroke = timeLeft <= 5 ? '#e74c3c' : '#c9a84c';
  text.textContent = timeLeft;
  text.style.color = timeLeft <= 5 ? '#e74c3c' : '#c9a84c';
}

function isCorrect(idx) {
  const q = gameQuestions[currentQ];
  if (q.multiPool) return idx === q._correctIdx;
  const a = q.answer;
  return Array.isArray(a) ? a.includes(idx) : a === idx;
}

function firstCorrectIdx() {
  const q = gameQuestions[currentQ];
  if (q.multiPool) return q._correctIdx;
  const a = q.answer;
  return Array.isArray(a) ? a[0] : a;
}

function timeUp() {
  answered = true; disableOptions();
  document.querySelectorAll('.option-btn')[firstCorrectIdx()].classList.add('correct');
  showFeedback(false);
  setTimeout(nextQuestion, 1500);
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true; clearInterval(timer);
  const ok = isCorrect(idx);
  const btns = document.querySelectorAll('.option-btn');
  btns[idx].classList.add(ok ? 'correct' : 'wrong');
  if (!ok) btns[firstCorrectIdx()].classList.add('correct');
  disableOptions();
  if (ok) {
    score += Math.max(10, Math.round(timeLeft / TIME_PER_Q * 50) + 10);
    showFeedback(true); launchConfetti();
  } else { showFeedback(false); }
  document.getElementById('scoreDisplay').textContent = score;
  setTimeout(nextQuestion, 1500);
}

function disableOptions() { document.querySelectorAll('.option-btn').forEach(b => b.disabled = true); }

function showFeedback(ok) {
  const o = document.getElementById('feedbackOverlay');
  document.getElementById('feedbackIcon').textContent = ok ? '✅' : '❌';
  o.className = 'feedback-overlay show';
  setTimeout(() => o.className = 'feedback-overlay', 800);
}

function launchConfetti() {
  const container = document.getElementById('confettiContainer');
  const colors = ['#c9a84c','#f0d080','#c0272d','#1a2a5e','#fff'];
  for (let i = 0; i < 50; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.animationDuration = (Math.random() * 1.5 + 1) + 's';
    p.style.animationDelay = Math.random() * 0.5 + 's';
    p.style.transform = `rotate(${Math.random() * 360}deg)`;
    container.appendChild(p);
    setTimeout(() => p.remove(), 2500);
  }
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= QUESTIONS_PER_GAME) showResult();
  else loadQuestion();
}

function showResult() {
  finalScore = score;
  document.getElementById('resultScore').textContent = score;
  document.getElementById('resultTotal').textContent = `/ ${QUESTIONS_PER_GAME} 題`;

  let grade, msg, sub, img;
  if (score >= 450)      { grade='S'; msg='🏆 S級 波記達人！';   sub='你對母校瞭如指掌，校友之光！'; img='levelS.gif'; launchConfetti(); setTimeout(launchConfetti,700); }
  else if (score >= 350) { grade='A'; msg='🌟 A級 表現出色！';   sub='對學校認識頗深，繼續加油！';   img='levelA.gif'; }
  else if (score >= 250) { grade='B'; msg='👍 B級 不錯喔！';     sub='再溫習一下學校歷史，下次更好！'; img='levelB.gif'; }
  else if (score >= 150) { grade='C'; msg='💪 C級 繼續努力！';   sub='多啲認識學校，你可以做到！';   img='levelC.gif'; }
  else                   { grade='D'; msg='📖 D級 多了解母校！'; sub='慢慢認識學校，一定會愛上佢！'; img='levelD.gif'; }

  document.getElementById('resultMsg').textContent = msg;
  document.getElementById('resultSub').textContent = sub;

  // Show level image
  const imgEl = document.getElementById('resultLevelImg');
  imgEl.src = img;
  imgEl.style.display = 'block';

  document.getElementById('nameInput').value = '';
  showScreen('resultScreen');
}

function saveScore() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) { alert('請輸入你嘅名字！'); return; }
  const scores = getScores();
  scores.push({ name, score: finalScore, date: new Date().toLocaleDateString('zh-HK') });
  scores.sort((a, b) => b.score - a.score);
  localStorage.setItem(LEADERBOARD_KEY, JSON.stringify(scores.slice(0, 50)));
  showLeaderboard();
}

function getScores() {
  try { return JSON.parse(localStorage.getItem(LEADERBOARD_KEY)) || []; }
  catch { return []; }
}

function showLeaderboard() {
  const scores = getScores();
  const list = document.getElementById('lbList');
  list.innerHTML = '';
  if (scores.length === 0) {
    list.innerHTML = '<div class="lb-empty">未有記錄，快來挑戰！</div>';
  } else {
    const medals = ['🥇','🥈','🥉'];
    scores.forEach((s, i) => {
      const div = document.createElement('div');
      div.className = `lb-item${i < 3 ? ' top'+(i+1) : ''}`;
      div.innerHTML = `
        <div class="lb-rank">${medals[i] || (i+1)}</div>
        <div class="lb-name">${s.name}</div>
        <div style="text-align:right">
          <div class="lb-score">${s.score}</div>
          <div class="lb-date">${s.date}</div>
        </div>`;
      list.appendChild(div);
    });
  }
  showScreen('leaderboardScreen');
}

function clearScores() {
  if (confirm('確定清除所有龍虎榜記錄？')) { localStorage.removeItem(LEADERBOARD_KEY); showLeaderboard(); }
}

function exitQuiz() {
  const modal = document.getElementById('exitModal');
  modal.style.display = 'flex';
}
function confirmExit() {
  closeExitModal();
  clearInterval(timer);
  showScreen('startScreen');
}
function closeExitModal() {
  document.getElementById('exitModal').style.display = 'none';
}

function restartQuiz() { startQuiz(); }
</script>
</body>
</html>
